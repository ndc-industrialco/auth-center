name: CI → Build Image → CD Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/ndc-industrialco/auth-center

jobs:
  # ── 1. CI: Lint, Test, Build ──────────────────────────────────────────────
  ci:
    name: CI — Lint & Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          DIRECT_URL: postgresql://dummy:dummy@localhost:5432/dummy
          AUTH_SECRET: dummy-secret-minimum-32-characters-long
          AUTH_URL: http://localhost:3001
          NEXTAUTH_URL: http://localhost:3001
          AUTH_TRUST_HOST: "true"
          AUTH_PRIVATE_KEY: "-----BEGIN PRIVATE KEY-----\ndummy\n-----END PRIVATE KEY-----"
          AUTH_PUBLIC_KEY: "-----BEGIN PUBLIC KEY-----\ndummy\n-----END PUBLIC KEY-----"
          AUTH_KEY_ID: dummy-key-id
          AZURE_AD_TENANT_ID: dummy
          AZURE_AD_CLIENT_ID: dummy
          AZURE_AD_CLIENT_SECRET: dummy
          REDIS_URL: redis://localhost:6379
        run: npm run build

  # ── 2. Build Docker image and push to GHCR ───────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. CD Deploy: Self-hosted runner on-prem ─────────────────────────────
  deploy:
    name: CD Deploy — On-Prem
    runs-on: [self-hosted, Linux, X64]
    needs: build
    environment: production
    timeout-minutes: 15

    steps:
      - name: Login to GHCR
        run: |
          echo "${{ secrets.GHCR_PAT }}" | \
            docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull & deploy
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          set -e
          cd /opt/auth-center

          export IMAGE_TAG
          docker compose pull migrate auth-center
          docker compose run --rm migrate
          docker compose up -d --remove-orphans auth-center
          docker image prune -f

          echo "✅ Deploy complete — $IMAGE_TAG"

      - name: Health check
        run: |
          echo "Waiting for app to be healthy..."
          for i in $(seq 1 12); do
            if wget -qO- http://localhost:7777/api/health | grep -q '"status":"ok"'; then
              echo "✅ Health check passed"
              exit 0
            fi
            echo "Attempt $i/12 — retrying in 5s..."
            sleep 5
          done
          echo "❌ Health check failed after 60s"
          exit 1
